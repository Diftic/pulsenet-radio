<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulsenet Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Layer 1: YouTube player (bottom) -->
    <div id="video-wrap">
      <div id="player"></div>
      <img id="idle-logo" src="assets/main_logo.png" draggable="false" alt="">
    </div>

    <!-- Layer 2: Sci-fi frame (no glow, structural) -->
    <img id="frame-base" src="assets/frame_base.png" draggable="false" alt="">

    <!-- Layer 3: Glow overlay (animated) — hidden via CSS if asset missing -->
    <img id="frame-glow" src="assets/frame_glow.png" draggable="false" alt=""
         onerror="this.style.display='none'">

    <!-- Layer 4: Station selector buttons -->
    <div id="stations-left"  class="station-col"></div>
    <div id="stations-right" class="station-col"></div>

    <!-- Layer 4c: Special utility buttons -->
    <button id="pulsenet-home-btn" class="station-btn">
      <img src="assets/pulsenet_icon.png" alt="PulseNet" draggable="false">
    </button>
    <button id="about-btn" class="station-btn">Info</button>

    <!-- Layer 4b: Station icon hover preview — centered over video rect -->
    <div id="station-preview" class="hidden">
      <img id="station-preview-img" src="" alt="" draggable="false">
    </div>

    <!-- Layer 5: Settings button + panel -->
    <button id="discord-btn">Join us on Discord</button>
    <button id="settings-btn">Settings Menu</button>

    <div id="settings-panel" class="hidden">
      <div class="settings-row">
        <button id="lock-btn" class="settings-action-btn">&#x1F513; Unlocked</button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Opacity</span>
        <input type="range" id="opacity-slider" class="settings-slider" min="20" max="100" value="100">
        <span class="settings-val" id="opacity-val">100%</span>
      </div>
      <div class="settings-row">
        <button class="settings-action-btn" id="zoom-down-btn">-10% size</button>
        <input type="number" id="zoom-input" class="settings-zoom-input" min="20" max="100" value="100">
        <button class="settings-action-btn" id="zoom-up-btn">+10% size</button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Hotkey</span>
        <input type="text" id="hotkey-input" class="settings-hotkey-input" readonly placeholder="Click, then press keys">
      </div>
    </div>

  </div>

  <script src="stations.js"></script>
  <script src="player.js"></script>
</body>
</html>
